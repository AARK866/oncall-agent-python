services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: oncall-agent-python:local
    container_name: oncall-agent-api
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_APP_USER:-oncall_app}:${POSTGRES_APP_PASSWORD:-oncall_app_dev_password}@postgres:5432/${POSTGRES_DB:-oncall_agent}
      DATABASE_AUTO_CREATE_SCHEMA: "false"
      TASK_QUEUE_MODE: celery
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MILVUS_URI: ${MILVUS_URI:-http://milvus:19530}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://host.docker.internal:11434/v1}
      PROMETHEUS_BASE_URL: ${PROMETHEUS_BASE_URL:-http://host.docker.internal:9090}
      LOKI_BASE_URL: ${LOKI_BASE_URL:-http://host.docker.internal:3100}
    ports:
      - "8000:8000"
    volumes:
      - oncall-data:/app/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/database', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: oncall-agent-python:local
    container_name: oncall-agent-migrate
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_APP_USER:-oncall_app}:${POSTGRES_APP_PASSWORD:-oncall_app_dev_password}@postgres:5432/${POSTGRES_DB:-oncall_agent}
      DATABASE_AUTO_CREATE_SCHEMA: "false"
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: oncall-agent-python:local
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_APP_USER:-oncall_app}:${POSTGRES_APP_PASSWORD:-oncall_app_dev_password}@postgres:5432/${POSTGRES_DB:-oncall_agent}
      DATABASE_AUTO_CREATE_SCHEMA: "false"
      TASK_QUEUE_MODE: celery
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MILVUS_URI: ${MILVUS_URI:-http://milvus:19530}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://host.docker.internal:11434/v1}
      PROMETHEUS_BASE_URL: ${PROMETHEUS_BASE_URL:-http://host.docker.internal:9090}
      LOKI_BASE_URL: ${LOKI_BASE_URL:-http://host.docker.internal:3100}
    command:
      - python
      - -m
      - celery
      - -A
      - app.tasks.celery_app:celery_app
      - worker
      - --loglevel=INFO
      - --queues=diagnosis,knowledge,maintenance
      - --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
      - --hostname=worker@%h
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - python -m celery -A app.tasks.celery_app:celery_app inspect ping -d worker@$$HOSTNAME --timeout=5
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    image: oncall-agent-python:local
    container_name: oncall-agent-beat
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_APP_USER:-oncall_app}:${POSTGRES_APP_PASSWORD:-oncall_app_dev_password}@postgres:5432/${POSTGRES_DB:-oncall_agent}
      DATABASE_AUTO_CREATE_SCHEMA: "false"
      TASK_QUEUE_MODE: celery
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command:
      - python
      - -m
      - celery
      - -A
      - app.tasks.celery_app:celery_app
      - beat
      - --loglevel=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: oncall-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oncall_agent}
      POSTGRES_USER: ${POSTGRES_USER:-oncall}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oncall_dev_password}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-oncall_app}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:-oncall_app_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-app-role.sh:/docker-entrypoint-initdb.d/10-app-role.sh:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-oncall} -d ${POSTGRES_DB:-oncall_agent}
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: oncall-redis
    command: redis-server --appendonly yes --maxmemory-policy noeviction
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    profiles:
      - milvus
    container_name: oncall-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls=http://127.0.0.1:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd-data:/etcd
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    profiles:
      - milvus
    container_name: oncall-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/minio_data
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.5.6
    profiles:
      - milvus
    container_name: oncall-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    restart: unless-stopped

volumes:
  oncall-data:
  postgres-data:
  redis-data:
  etcd-data:
  minio-data:
  milvus-data:
