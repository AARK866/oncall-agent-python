services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: oncall-agent-python:local
    container_name: oncall-agent-api
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      INCIDENT_DB_PATH: /app/app/data/oncall_agent.db
      MILVUS_URI: ${MILVUS_URI:-http://milvus:19530}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://host.docker.internal:11434/v1}
      PROMETHEUS_BASE_URL: ${PROMETHEUS_BASE_URL:-http://host.docker.internal:9090}
      LOKI_BASE_URL: ${LOKI_BASE_URL:-http://host.docker.internal:3100}
    ports:
      - "8000:8000"
    volumes:
      - oncall-data:/app/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    profiles:
      - milvus
    container_name: oncall-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls=http://127.0.0.1:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd-data:/etcd
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    profiles:
      - milvus
    container_name: oncall-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/minio_data
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.5.6
    profiles:
      - milvus
    container_name: oncall-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    restart: unless-stopped

volumes:
  oncall-data:
  etcd-data:
  minio-data:
  milvus-data:
