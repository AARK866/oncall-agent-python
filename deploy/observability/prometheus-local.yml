global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/oncall-agent-alerts.yml

scrape_configs:
  - job_name: oncall-agent
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8000
        labels:
          service: oncall-agent
          environment: local
