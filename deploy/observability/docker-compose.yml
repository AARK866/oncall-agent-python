services:
  prometheus:
    image: prom/prometheus:latest
    container_name: oncall-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus-local.yml:/etc/prometheus/prometheus.yml:ro
      - ./oncall-agent-alerts.yml:/etc/prometheus/rules/oncall-agent-alerts.yml:ro
      - oncall-prometheus-data:/prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: oncall-loki
    command:
      - -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./loki-local.yml:/etc/loki/local-config.yaml:ro
      - oncall-loki-data:/loki
    restart: unless-stopped

volumes:
  oncall-prometheus-data:
  oncall-loki-data:
