services:
  alertmanager:
    image: prom/alertmanager:latest
    container_name: oncall-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager-local.yml:/etc/alertmanager/alertmanager.yml:ro
      - oncall-alertmanager-data:/alertmanager
    secrets:
      - alertmanager_webhook_token
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: oncall-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus-local.yml:/etc/prometheus/prometheus.yml:ro
      - ./oncall-agent-alerts.yml:/etc/prometheus/rules/oncall-agent-alerts.yml:ro
      - ./payment-api-alerts.yml:/etc/prometheus/rules/payment-api-alerts.yml:ro
      - oncall-prometheus-data:/prometheus
    depends_on:
      - alertmanager
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: oncall-loki
    command:
      - -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./loki-local.yml:/etc/loki/local-config.yaml:ro
      - oncall-loki-data:/loki
    restart: unless-stopped

volumes:
  oncall-alertmanager-data:
  oncall-prometheus-data:
  oncall-loki-data:

secrets:
  alertmanager_webhook_token:
    file: ./secrets/alertmanager-webhook-token
