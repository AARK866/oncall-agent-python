global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/oncall-agent-alerts.yml

scrape_configs:
  - job_name: oncall-agent
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/oncall_metrics_token
    static_configs:
      - targets:
          - api:8000
