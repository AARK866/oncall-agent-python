apiVersion: v1
kind: Secret
metadata:
  name: oncall-agent-secrets
  namespace: oncall-agent
type: Opaque
stringData:
  DATABASE_URL: postgresql+psycopg://USER:PASSWORD@POSTGRES_HOST:5432/oncall_agent
  REDIS_URL: redis://:PASSWORD@REDIS_HOST:6379/0
  CELERY_RESULT_BACKEND: redis://:PASSWORD@REDIS_HOST:6379/1
  API_TOKEN: REPLACE_WITH_A_LONG_RANDOM_TOKEN
  WEBHOOK_SECRET: REPLACE_WITH_A_LONG_RANDOM_SECRET
  ALERTMANAGER_WEBHOOK_TOKEN: REPLACE_WITH_A_LONG_RANDOM_TOKEN
  METRICS_AUTH_TOKEN: REPLACE_WITH_A_LONG_RANDOM_TOKEN
  LLM_API_KEY: REPLACE_WITH_LLM_API_KEY
  EMBEDDING_API_KEY: REPLACE_WITH_EMBEDDING_API_KEY
  MILVUS_URI: http://MILVUS_HOST:19530
  MILVUS_TOKEN: REPLACE_WITH_MILVUS_TOKEN
  GITHUB_TOKEN: REPLACE_WITH_GITHUB_TOKEN
