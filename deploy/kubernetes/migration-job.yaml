apiVersion: batch/v1
kind: Job
metadata:
  name: oncall-agent-migrate
  namespace: oncall-agent
  labels:
    app.kubernetes.io/name: oncall-agent
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oncall-agent
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      serviceAccountName: oncall-agent
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/your-org/oncall-agent-python:0.1.0
          command:
            - python
            - scripts/run_production_migrations.py
          envFrom:
            - configMapRef:
                name: oncall-agent-config
            - secretRef:
                name: oncall-agent-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
