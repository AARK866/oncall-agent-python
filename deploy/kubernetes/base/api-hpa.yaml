apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: oncall-agent-api
  namespace: oncall-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: oncall-agent-api
  minReplicas: 2
  maxReplicas: 10
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
