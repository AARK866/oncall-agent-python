apiVersion: apps/v1
kind: Deployment
metadata:
  name: oncall-agent-worker
  namespace: oncall-agent
  labels:
    app.kubernetes.io/name: oncall-agent
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: oncall-agent
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oncall-agent
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: oncall-agent
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 120
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: oncall-agent-python:0.1.0
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - celery
            - -A
            - app.tasks.celery_app:celery_app
            - worker
            - --loglevel=INFO
            - --queues=diagnosis,knowledge,maintenance
            - --concurrency=2
            - --hostname=worker@%h
          envFrom:
            - configMapRef:
                name: oncall-agent-config
            - secretRef:
                name: oncall-agent-secrets
          resources:
            requests:
              cpu: 500m
              memory: 768Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
